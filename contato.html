<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato – StreamFlixVIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0d0d0f; --border:#2a2a35; --card:#1c1c22; --text:#f0f0f5; --muted:#888899; --accent:#e50914; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }
    nav { background:rgba(13,13,15,0.95); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; height:60px; }
    .logo { font-size:1.3rem; font-weight:900; } .logo span { color:var(--accent); }
    .content { max-width:560px; margin:0 auto; padding:48px 24px; }
    h1 { font-size:1.8rem; margin-bottom:8px; }
    p { color:var(--muted); line-height:1.7; margin-bottom:24px; }
    .info-box { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px 24px; }
    .info-box p { margin:0; }
    footer { border-top:1px solid var(--border); padding:24px; text-align:center; color:var(--muted); font-size:0.8rem; margin-top:60px; }
    a { color:var(--accent); }
  </style>
</head>
<body>
<nav><div class="logo"><a href="/" style="text-decoration:none;color:inherit">Stream<span>Flix</span>VIP</a></div></nav>
<div class="content">
  <h1>Contato</h1>
  <p>Tem alguma dúvida, sugestão ou quer reportar um problema? Fale conosco pelo email abaixo e responderemos em até 48 horas.</p>
  <div class="info-box">
    <p>📧 <a href="mailto:contato@streamflixvip.online">contato@streamflixvip.online</a></p>
  </div>
</div>
<footer>© 2025 StreamFlixVIP</footer>
</body>
</html>
